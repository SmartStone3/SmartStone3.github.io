<header class="site-header">
  <nav class="container nav-wrap" aria-label="主导航">
    <a class="brand" href="{{ site.Home.RelPermalink }}">
      <span class="brand-mark">S3</span>
      <span class="brand-text">{{ site.Title }}</span>
    </a>
    <button class="menu-toggle" id="menu-toggle" aria-expanded="false" aria-controls="menu-list">菜单</button>
    <ul class="menu-list" id="menu-list">
      {{ range site.Menus.main }}
      <li>
        <a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>{{ .Name }}</a>
      </li>
      {{ end }}
    </ul>
  </nav>
</header>
