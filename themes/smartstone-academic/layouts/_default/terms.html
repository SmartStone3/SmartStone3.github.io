{{ define "main" }}
<section class="container page-head">
  <p class="hero-kicker">分类</p>
  <h1>{{ .Title }}</h1>
</section>

<section class="container panel">
  <div class="taxonomy-cloud">
    {{ range .Data.Terms.Alphabetical }}
    <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }} <span>{{ .Count }}</span></a>
    {{ end }}
  </div>
</section>
{{ end }}
