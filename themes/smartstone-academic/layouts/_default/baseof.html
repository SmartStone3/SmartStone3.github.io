<!doctype html>
<html lang="{{ site.LanguageCode | default "zh-cn" }}" data-theme="light">
<head>
  {{ partial "head.html" . }}
</head>
<body class="{{ block "bodyClass" . }}{{ end }}">
  <div class="site-shell">
    {{ partial "header.html" . }}
    <div class="reading-progress" id="reading-progress"></div>
    <main class="main-shell">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
  <script src="{{ "js/main.js" | relURL }}" defer></script>
</body>
</html>
