baseURL = 'https://smartstone3.github.io/'
languageCode = 'zh-cn'
title = 'SmartStone Blog'
theme = 'smartstone-academic'
pagination.pagerSize = 10

[taxonomies]
  tag = 'tags'

[params]
  description = '记录 C++、Unreal Engine、动画系统与技术开发笔记。'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = 'auto'
  disableThemeToggle = false

[params.author]
  name = 'SmartStone3'
  role = 'C++ / Unreal Engine / 动画系统开发者'
  bio = '关注 C++、UE 动画系统、IK 工作流、工具链与工程实践，持续输出可复用的技术笔记。'
  github = 'https://github.com/SmartStone3'

[params.homeInfoParams]
  Title = '欢迎来到 SmartStone Blog'
  Content = '这里分享 Unreal Engine 技术笔记、动画系统实践与开发心得。'

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = false
    style = 'monokai'

[[menu.main]]
  identifier = 'home'
  name = '首页'
  url = '/'
  weight = 10

